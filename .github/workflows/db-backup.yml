# Weekly self-managed Postgres backup. Supabase's free tier has no automated
# backups, so we pg_dump the production DB ourselves and keep the compressed
# dump as a GitHub artifact (90-day retention, free). Restores with `psql`.
#
# Setup (one time): add a repo Actions secret SUPABASE_DB_PASSWORD = the
# production DB password only (raw, no encoding). Host/user below come from the
# Session-pooler connection string (not secret — derived from the public project
# ref). Passing the password via PGPASSWORD avoids URI-parsing breakage when the
# password contains special characters.
#   gh secret set SUPABASE_DB_PASSWORD -R dongj12-lee/TRIP
name: DB backup

on:
  schedule:
    - cron: '0 19 * * 0' # Sun 19:00 UTC = Mon 04:00 KST
  workflow_dispatch:

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install postgresql-client 17
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: pg_dump → gzip
        env:
          # Session pooler host/user (public; from the connection string).
          PGHOST: aws-1-ap-south-1.pooler.supabase.com
          PGPORT: '5432'
          PGUSER: postgres.dwajyyyimwpspdvxeflp
          PGDATABASE: postgres
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${PGPASSWORD:-}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not set — see this file's header."
            exit 1
          fi
          STAMP=$(date -u +%Y%m%d-%H%M)
          # Discrete PG* env vars (no URI) so a special-char password can't break
          # connection-string parsing. Dump to a file so a failure fails the step.
          pg_dump --no-owner --no-privileges --clean --if-exists -f dump.sql
          gzip -9 dump.sql
          mv dump.sql.gz "trip-backup-${STAMP}.sql.gz"
          ls -lh "trip-backup-${STAMP}.sql.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: trip-backup-*.sql.gz
          retention-days: 90
